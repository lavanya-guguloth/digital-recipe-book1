services:
  - type: web
    name: digital-recipe-book-api
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: MAX_FILE_SIZE
        value: 5242880
      - key: UPLOAD_DIR
        value: ./uploads
    # Add your database and other secrets in the Render dashboard
    # DATABASE_URL, FRONTEND_URL should be set in Render environment

databases:
  - name: recipedb
    databaseName: recipe_db
    user: postgres
    plan: starter
